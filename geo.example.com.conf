# ─── geo.example.com — раздача geoip.dat / geosite.dat ──────────────────
# Добавить этот блок в /opt/remnawave/nginx/nginx.conf
# (целиком, рядом с остальными server { } блоками).

server {
    listen 443 ssl;
    http2 on;
    server_name geo.example.com;

    ssl_certificate     /etc/nginx/ssl/geo_fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/geo_privkey.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://geo-serve:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
